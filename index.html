<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT: ANKITA_BDAY_2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 3;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100%; } }
        .glitch:hover { text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
        .hidden-section { display: none; }
        .memory-bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 255, 65, 0.2);
            border: 1px solid #00ff41;
            cursor: pointer;
            transition: transform 0.2s;
        }
    </style>
</head>
<body class="crt h-screen flex items-center justify-center p-4">
    <div class="scanline"></div>

    <div id="main-terminal" class="w-full max-w-2xl bg-black border-2 border-green-900 p-6 shadow-[0_0_20px_rgba(0,255,65,0.2)] z-10 relative">
        
        <div class="flex justify-between border-b border-green-900 pb-2 mb-4 text-xs opacity-70">
            <span>SYSTEM: ANKITA_OS_v1.0</span>
            <span id="timestamp"></span>
        </div>

        <div id="content-area" class="min-h-[400px] flex flex-col justify-between">
            <div id="text-log" class="space-y-4 overflow-y-auto max-h-[350px] pr-2">
                <!-- Messages go here -->
            </div>
            
            <div id="input-area" class="mt-4 border-t border-green-900 pt-4">
                <!-- Inputs go here -->
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            name: "Ankita",
            chapters: [
                {
                    id: 0,
                    text: "Access Denied. Restricted files for user 'Ankita' detected. Please verify identity: Where was our first date?",
                    answer: "old england cafe",
                    hint: "Hint: Think of that cozy English-style spot where it all began."
                },
                {
                    id: 1,
                    text: "Identity Verified. Memories of Old England Cafe confirmed. Decrypting 'The Memory Archive'... Logic failure detected. You must manually stabilize the memories.",
                    type: "minigame"
                },
                {
                    id: 2,
                    text: "Archive Stabilized. You've unlocked the 'Compliment Core'. Every click repairs a fragment of my heart.",
                    type: "compliments"
                },
                {
                    id: 3,
                    text: "Final Security Gate: If we could teleport anywhere right now, where is the 'secret spot' we always talk about?",
                    answer: "bali", 
                    hint: "Hint: Blue water and zero responsibilities."
                }
            ],
            compliments: [
                "Your laugh is my favorite soundtrack.",
                "You are the most resilient person I know.",
                "Your brain is the sexiest thing about you.",
                "Even your morning hair is a masterpiece.",
                "You make every mundane day feel like a movie scene.",
                "I'm still convinced you're a glitch in the matrix because you're too perfect."
            ]
        };

        let currentChapter = 0;
        const log = document.getElementById('text-log');
        const inputArea = document.getElementById('input-area');

        function updateTime() {
            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);

        function addMessage(text, delay = 0, isSystem = true) {
            const p = document.createElement('p');
            p.className = isSystem ? "leading-relaxed" : "text-blue-400 italic";
            log.appendChild(p);
            
            let i = 0;
            function type() {
                if (i < text.length) {
                    p.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 20);
                    log.scrollTop = log.scrollHeight;
                }
            }
            setTimeout(type, delay);
        }

        function loadChapter() {
            inputArea.innerHTML = '';
            const chapter = CONFIG.chapters[currentChapter];
            
            if (!chapter) {
                triggerFinale();
                return;
            }

            addMessage(`> ${chapter.text}`);

            if (chapter.answer) {
                const input = document.createElement('input');
                input.className = "bg-transparent border-b border-green-500 outline-none w-full mt-2 uppercase";
                input.placeholder = "ENTER PASSCODE...";
                input.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        if (input.value.toLowerCase().trim() === chapter.answer.toLowerCase()) {
                            addMessage("ACCESS GRANTED.", 0, false);
                            currentChapter++;
                            setTimeout(loadChapter, 1000);
                        } else {
                            addMessage("ERROR: INCORRECT KEY. " + (chapter.hint || ""), 0, true);
                            input.value = '';
                        }
                    }
                };
                inputArea.appendChild(input);
            } else if (chapter.type === "minigame") {
                const btn = document.createElement('button');
                btn.className = "bg-green-900 px-4 py-2 mt-4 hover:bg-green-700 transition";
                btn.innerText = "INITIALIZE STABILIZATION";
                btn.onclick = startMiniGame;
                inputArea.appendChild(btn);
            } else if (chapter.type === "compliments") {
                const btn = document.createElement('button');
                btn.className = "bg-pink-900 text-white px-4 py-2 mt-4 hover:bg-pink-700 transition";
                btn.innerText = "EXTRACT COMPLIMENT";
                let count = 0;
                btn.onclick = () => {
                    const randomComp = CONFIG.compliments[Math.floor(Math.random() * CONFIG.compliments.length)];
                    addMessage(`[HEART_CORE]: ${randomComp}`, 0, false);
                    count++;
                    if (count >= 5) {
                        const nextBtn = document.createElement('button');
                        nextBtn.className = "block mt-2 text-xs underline text-green-500";
                        nextBtn.innerText = "Proceed to Final Level >>";
                        nextBtn.onclick = () => { currentChapter++; loadChapter(); };
                        inputArea.appendChild(nextBtn);
                    }
                };
                inputArea.appendChild(btn);
            }
        }

        function startMiniGame() {
            log.innerHTML = `<p class="text-center">CLICK 10 FLOATING MEMORIES TO DECRYPT</p>`;
            const gameContainer = document.createElement('div');
            gameContainer.className = "relative h-64 w-full border border-green-900 mt-4 overflow-hidden";
            log.appendChild(gameContainer);
            
            let found = 0;
            for (let i = 0; i < 10; i++) {
                const bubble = document.createElement('div');
                bubble.className = "memory-bubble w-8 h-8 flex items-center justify-center text-[10px]";
                bubble.style.top = Math.random() * 80 + "%";
                bubble.style.left = Math.random() * 80 + "%";
                bubble.innerText = "ERR";
                bubble.onclick = () => {
                    bubble.style.display = 'none';
                    found++;
                    if (found === 10) {
                        addMessage("DECRYPTION COMPLETE. SECTOR 02 OPEN.");
                        currentChapter++;
                        setTimeout(loadChapter, 1500);
                    }
                };
                gameContainer.appendChild(bubble);
            }
        }

        function triggerFinale() {
            log.innerHTML = `
                <div class="text-center space-y-6">
                    <h1 class="text-4xl font-bold glitch">HAPPY BIRTHDAY ANKITA!</h1>
                    <p class="text-xl">System fully restored. Your gift is ready for pickup.</p>
                    <div class="border-2 border-dashed border-green-500 p-4 inline-block">
                        <p class="text-xs">VOUCHER CODE: BEST-GF-FOREVER</p>
                        <p class="mt-2">REDEEM FOR: ONE FULL DAY OF ADVENTURE & UNLIMITED HUGS</p>
                    </div>
                    <p class="mt-10 text-[10px] opacity-50">You've unlocked every file. I love you more than code can express.</p>
                </div>
            `;
            inputArea.innerHTML = `<button onclick="location.reload()" class="text-xs border border-green-900 p-1">REBOOT SYSTEM</button>`;
        }

        window.onload = () => {
            addMessage(`BOOTING SYSTEM...`, 0);
            addMessage(`SCANNING FOR LIFEFORMS...`, 500);
            addMessage(`ANOMALY DETECTED: UNUSUAL LEVELS OF BEAUTY AND BRILLIANCE...`, 1200);
            setTimeout(loadChapter, 2500);
        };
    </script>
</body>
</html>
